name: Cross-Family Review Status

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  seed-status:
    name: Seed external review status
    runs-on: ubuntu-latest
    steps:
      - name: Post pending cross-family review status
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          EVENT_ACTION: ${{ github.event.action }}
        run: |
          description="Waiting for exact-head cross-family adversarial review"
          if [ "${EVENT_ACTION}" = "ready_for_review" ]; then
            description="Ready-state exact-head cross-family review required"
          fi

          gh api --method POST "repos/${GH_REPO}/statuses/${HEAD_SHA}" \
            -f state=pending \
            -f context=cross-family-adversarial-review \
            -f target_url="${PR_URL}" \
            -f description="${description}"
